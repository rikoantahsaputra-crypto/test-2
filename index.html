<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kepegawaian RSDS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{
background:linear-gradient(135deg,#eef2ff,#f8fafc);
color:#1f2937;
}

/* WRAPPER */
.wrapper{
max-width:1200px;
margin:auto;
padding:20px;
position:relative;
}

/* LOGIN */
.login-card{
max-width:430px;
margin:60px auto;
background:#1e3a8a;
color:#fff;
padding:40px;
border-radius:22px;
box-shadow:0 20px 40px rgba(0,0,0,.15);
text-align:center;
transition:.3s;
}

.login-card h2{
margin-bottom:10px;
font-weight:600;
letter-spacing:.5px;
}

.login-card input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
margin:18px 0;
font-size:14px;
}

.login-card input:focus{
outline:none;
box-shadow:0 0 0 2px rgba(255,255,255,.5);
}

.login-card button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2563eb;
color:#fff;
font-weight:600;
cursor:pointer;
transition:.2s;
}

.login-card button:hover{
background:#1d4ed8;
}

.loading{
display:none;
margin-top:12px;
font-size:13px;
opacity:.85;
}

/* DASHBOARD LAYOUT */
.dashboard-layout{display:block}

/* HEADER */
.header{
margin-bottom:18px;
padding:18px;
background:#fff;
border-radius:16px;
border:1px solid #e5e7eb;
box-shadow:0 6px 18px rgba(0,0,0,.05);
}

.welcome{
font-size:20px;
font-weight:700;
color:#1e3a8a;
}

.nama-user{
font-size:14px;
margin-top:4px;
color:#6b7280;
}

/* DROPDOWN */
.top-menu{
position:absolute;
top:20px;
right:20px;
z-index:50;
}

.menu-btn{
width:36px;
height:36px;
border-radius:50%;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 6px 15px rgba(0,0,0,.15);
cursor:pointer;
font-weight:bold;
transition:.2s;
}

.menu-btn:hover{
transform:rotate(90deg);
}

.dropdown{
display:none;
position:absolute;
right:0;
margin-top:8px;
background:#fff;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
overflow:hidden;
}

.dropdown div{
padding:12px 16px;
font-size:13px;
cursor:pointer;
transition:.2s;
}

.dropdown div:hover{
background:#f3f4f6;
}

/* MESSAGE */
.message-header{
background:#1e3a8a;
color:#fff;
padding:12px 14px;
border-radius:14px;
display:flex;
justify-content:space-between;
cursor:pointer;
margin-bottom:12px;
font-size:13px;
}

.message-box{
display:none;
background:#fff;
border-radius:14px;
padding:12px;
max-height:220px;
overflow-y:auto;
border:1px solid #e5e7eb;
margin-bottom:15px;
}

.message-card{
padding:10px 0;
border-bottom:1px solid #f1f1f1;
font-size:13px;
}

/* TABS (HP) */
.tabs{
display:flex;
margin-bottom:12px;
border-radius:12px;
overflow:hidden;
background:#e5e7eb;
}

.tab{
flex:1;
text-align:center;
padding:12px;
cursor:pointer;
font-size:14px;
transition:.2s;
}

.tab.active{
background:#1e3a8a;
color:#fff;
font-weight:600;
}

/* SLIDER */
.slider{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;
}

.slide{
min-width:100%;
scroll-snap-align:start;
flex-shrink:0;
}

/* CARD */
.riwayat-card{
background:#fff;
border-radius:16px;
padding:16px;
margin-bottom:12px;
border:1px solid #e5e7eb;
font-size:13px;
box-shadow:0 4px 12px rgba(0,0,0,.05);
transition:.2s;
}

.riwayat-card:hover{
transform:translateY(-2px);
}

.folder-link{
display:inline-block;
margin-top:8px;
color:#2563eb;
text-decoration:none;
font-weight:600;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.menu{
background:#fff;
border-radius:16px;
padding:22px;
text-align:center;
border:1px solid #e5e7eb;
cursor:pointer;
transition:.2s;
box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.menu:hover{
transform:translateY(-3px);
box-shadow:0 8px 20px rgba(0,0,0,.1);
}

.menu span{
font-size:28px;
display:block;
margin-bottom:8px;
}

/* PROFIL */
.profil-card{
background:#fff;
border-radius:18px;
padding:20px;
border:1px solid #e5e7eb;
font-size:13px;
line-height:1.6;
box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.update-btn{
display:block;
margin-top:14px;
padding:12px;
background:#1e3a8a;
color:#fff;
text-align:center;
border-radius:12px;
text-decoration:none;
font-weight:600;
transition:.2s;
}

.update-btn:hover{
background:#1d4ed8;
}

/* DESKTOP MODE */
@media (min-width:1024px){

.dashboard-layout{
display:grid;
grid-template-columns:240px 1fr;
gap:25px;
}

.sidebar{
background:#fff;
border-radius:18px;
padding:20px;
height:fit-content;
border:1px solid #e5e7eb;
box-shadow:0 6px 18px rgba(0,0,0,.05);
}

.sidebar h3{
font-size:13px;
margin-bottom:18px;
color:#6b7280;
text-transform:uppercase;
letter-spacing:1px;
}

.sidebar-item{
padding:12px;
border-radius:12px;
cursor:pointer;
margin-bottom:10px;
font-size:14px;
transition:.2s;
}

.sidebar-item.active,
.sidebar-item:hover{
background:#1e3a8a;
color:#fff;
}

.tabs{display:none;}
.slider{overflow:hidden;}
}
</style>
</head>

<body>
<div class="wrapper">

<div id="loginBox" class="login-card">
<h2>Kepegawaian RSDS</h2>
<input id="nip" placeholder="Masukkan NIP / NIK">
<button onclick="login()">Masuk</button>
<div id="loading" class="loading">Memverifikasi...</div>
</div>

<div id="dashboard" style="display:none">

<div class="top-menu">
<div class="menu-btn" onclick="toggleDropdown()">⋮</div>
<div class="dropdown" id="dropdown">
<div onclick="logout()">Keluar Aplikasi</div>
</div>
</div>

<div class="dashboard-layout">

<div class="sidebar" id="sidebarMenu" style="display:none;">
<h3>Menu</h3>
<div class="sidebar-item active" onclick="goSlide(0)">Riwayat</div>
<div class="sidebar-item" onclick="goSlide(1)">Layanan</div>
<div class="sidebar-item" onclick="goSlide(2)">Profil</div>
</div>

<div class="main-content">

<div class="header">
<div class="welcome">Welcome To Kepegawaian RSDS</div>
<div class="nama-user" id="namaUser"></div>
</div>

<div id="messageContainer"></div>

<div class="tabs">
<div class="tab active" onclick="goSlide(0)">Riwayat</div>
<div class="tab" onclick="goSlide(1)">Layanan</div>
<div class="tab" onclick="goSlide(2)">Profil</div>
</div>

<div class="slider" id="slider">
<div class="slide" id="riwayatSlide"></div>
<div class="slide" id="layananSlide"></div>
<div class="slide" id="profilSlide"></div>
</div>

</div>
</div>
</div>
</div>

<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbyjYOjeXz2sJame1uf5sEjutY04B1RghTek5WmTbKb0qso_uJcLNjWoucbify9CvJ8m/exec";
let globalData=null;

function mapJudul(sheet, detail){
const s = sheet.replace("data_","").toLowerCase();
if(s==="pangkat") return "Pengajuan Pangkat";
if(s==="kgb") return "Pengajuan Gaji Berkala";
if(s==="cuti") return "Pengajuan Cuti";
if(s==="ukom") return "Pengajuan UKOM";
if(s==="jafung") return "Pengajuan Jabatan Fungsional";
if(s==="sib_sip") return "Pengajuan SIP / SIB";
if(s==="slks") return "Pengajuan SLKS";
if(s==="arsip"){
let jenis = detail["jenis-arsip"]||detail["JENIS-ARSIP"]||detail["jenis_arsip"]||detail["JENIS_ARSIP"]||"";
if(jenis.includes(":")) jenis=jenis.split(":")[1];
jenis=jenis.trim();
return jenis ? "Arsip "+jenis : "Arsip";
}
return sheet;
}

window.onload=()=>{
if(window.innerWidth>=1024){
document.getElementById("sidebarMenu").style.display="block";
}
const session=localStorage.getItem("rsds_session");
if(session) fetchData(session);
};

function login(){
const nip=document.getElementById("nip").value.trim();
if(!nip) return;
localStorage.setItem("rsds_session",nip);
fetchData(nip);
}

function fetchData(nip){
document.getElementById("loading").style.display="block";
fetch(GAS_URL,{method:"POST",body:JSON.stringify({nip})})
.then(r=>r.json())
.then(r=>{
if(!r.status){alert(r.message);logout();return;}
globalData=r.data;
document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";
document.getElementById("namaUser").innerText=
"Sdr/i "+(globalData.profile.NAMA||globalData.profile.nama||"");
renderAll();
});
}

function renderAll(){
renderPesan();
renderRiwayat();
renderLayanan();
renderProfil();
}

function renderPesan(){
if(!globalData.pesan || !globalData.pesan.length) return;
let html=`<div class="message-header" onclick="toggleMsg()">
<div>Pesan dari Bagian Kepegawaian</div>
<div>${globalData.pesan.length}</div>
</div>
<div class="message-box" id="msgBox">`;
globalData.pesan.forEach(m=>{
html+=`<div class="message-card">${m.text}
<div style="font-size:11px;color:#6b7280">${m.time}</div></div>`;
});
html+="</div>";
document.getElementById("messageContainer").innerHTML=html;
}

function toggleMsg(){
const b=document.getElementById("msgBox");
b.style.display=b.style.display==="block"?"none":"block";
}

function renderRiwayat(){

let data = globalData.riwayat || [];

if(!data.length){
document.getElementById("riwayatSlide").innerHTML=
"<div style='text-align:center;color:#9ca3af;padding:30px'>Belum ada aktivitas</div>";
return;
}

// SORT TERBARU
data.sort((a,b)=>{
let ta = new Date(a.detail.TIMESTAMP || 0);
let tb = new Date(b.detail.TIMESTAMP || 0);
return tb - ta;
});

// HITUNG SUMMARY
let total=data.length;
let proses=0, selesai=0, tolak=0;

data.forEach(x=>{
let status=(x.detail.STATUS||x.detail.status||"").toLowerCase();
if(status.includes("selesai")) selesai++;
else if(status.includes("tolak")) tolak++;
else proses++;
});

// HEADER + SUMMARY
let h=`
<div class="riwayat-header">
<div>
<h3>Riwayat Pengajuan Layanan</h3>
<small>Data tersusun otomatis berdasarkan aktivitas terbaru</small>
</div>
<div style="font-size:18px;font-weight:700">${total}</div>
</div>

<div class="summary-box">
<div class="summary-card">
<b>${total}</b>
<span>Total</span>
</div>
<div class="summary-card">
<b>${proses}</b>
<span>Diproses</span>
</div>
<div class="summary-card">
<b>${selesai}</b>
<span>Selesai</span>
</div>
<div class="summary-card">
<b>${tolak}</b>
<span>Ditolak</span>
</div>
</div>

<div class="timeline">
`;

// LOOP DATA
data.forEach(x=>{

let judul = mapJudul(x.sheet,x.detail);
let status=(x.detail.STATUS||x.detail.status||"");
let badgeClass="proses";

if(status.toLowerCase().includes("selesai")) badgeClass="selesai";
if(status.toLowerCase().includes("tolak")) badgeClass="tolak";

h+=`<div class="riwayat-card"><b>${judul}</b><br>`;

// DETAIL
Object.entries(x.detail).forEach(([k,v])=>{

if(k==="TIMESTAMP") return;

if(k.toLowerCase()==="status"){
h+=`<div style="margin-top:6px">
<span class="badge ${badgeClass}">${v}</span>
</div>`;
return;
}

if(String(v).startsWith("http")){
h+=`<a href="${v}" target="_blank" class="folder-link">📂 Buka Folder</a>`;
}else{

if(typeof v==="string" && v.includes("T") && v.includes("Z")){
let d=new Date(v);
let tanggal=d.toLocaleDateString("id-ID");
h+=`<div>${k}: ${tanggal}</div>`;
}else{
h+=`<div>${k}: ${v}</div>`;
}

}

});

h+=`</div>`;

});

// TUTUP TIMELINE
h+=`</div>`;

// RENDER
document.getElementById("riwayatSlide").innerHTML=h;
}
function renderLayanan(){
document.getElementById("layananSlide").innerHTML=`
<div class="grid">
<div class="menu" onclick="openUrl('https://rikoantah.github.io/pangkat-rsds-aktive/')"><span>👤</span>Pangkat</div>
<div class="menu" onclick="openUrl('https://rikoantah.github.io/Gaji-Berkala-RSDS-Soedarso/')"><span>💰</span>Gaji Berkala</div>
<div class="menu" onclick="openUrl('https://rikoantah.github.io/Ukom-Rsds/')"><span>📝</span>UKOM</div>
<div class="menu" onclick="openUrl('https://rikoantah.github.io/Jafung-D/')"><span>💼</span>Jabatan Fungsional</div>
<div class="menu" onclick="openUrl('https://rikoantahsaputra94-jpg.github.io/Tampilan-Cuti-Umpar/')"><span>📅</span>Cuti</div>
<div class="menu" onclick="openUrl('https://script.google.com/macros/s/AKfycbwAwouQ9BK6S9GzQeFtkUxKQJY_iunIfS35Jfe0wYD8L7A6-C5InI7IkFW4eSOnEKQz/exec')"><span>🧮</span>Angka Kredit</div>
<div class="menu" onclick="openUrl('https://rikoantah.github.io/sip-sib/')"><span>🪪</span>SIP / SIB</div>
<div class="menu" onclick="openUrl('https://rikoantah.github.io/slks-d/')"><span>⭐</span>SLKS</div>
</div>`;
}

function renderProfil(){
let p=globalData.profile;
let h=`<div class="profil-card">`;
h+=`<div><b>NAMA</b><br>${p.NAMA||p.nama||"-"}</div><br>`;
h+=`<div><b>NIP</b><br>${p.NIP||p.nip||"-"}</div><br>`;
Object.entries(p).forEach(([k,v])=>{
if(k.toLowerCase()==="nama"||k.toLowerCase()==="nip") return;
h+=`<div><b>${k}</b><br>${v||"-"}</div><br>`;
});
h+=`<div style="color:#b91c1c;font-size:12px">
Jika ada data belum update silahkan kirimkan perubahan data.
</div>
<a href="#" class="update-btn">Permohonan Update Data</a>
</div>`;
document.getElementById("profilSlide").innerHTML=h;
}

function goSlide(i){
const slider=document.getElementById("slider");
slider.scrollTo({left:i*slider.clientWidth,behavior:"smooth"});
document.querySelectorAll(".tab").forEach((t,idx)=>{
t.classList.toggle("active",idx===i);
});
document.querySelectorAll(".sidebar-item").forEach((t,idx)=>{
t.classList.toggle("active",idx===i);
});
}

function openUrl(url){window.open(url,"_blank");}
function toggleDropdown(){
const d=document.getElementById("dropdown");
d.style.display=d.style.display==="block"?"none":"block";
}
function logout(){
localStorage.removeItem("rsds_session");
location.reload();
}
</script>
</body>
</html>
